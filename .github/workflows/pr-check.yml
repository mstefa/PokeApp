name: PR Verification & Security Check

on:
  pull_request:
    branches: [main]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  verify:
    name: Build, Lint & Test
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install Pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11.5.0
          run_install: false

      - name: Get Pnpm Store Directory
        shell: bash
        id: pnpm-cache
        run: |
          echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_ENV

      - name: Cache Pnpm Dependencies
        uses: actions/cache@v4
        with:
          path: ${{ env.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Install API Dependencies
        working-directory: api
        run: pnpm install --frozen-lockfile

      - name: Install Client Dependencies
        working-directory: client
        run: pnpm install --frozen-lockfile

      # 🛡️ Run security checks on dependencies
      - name: API Security Audit
        working-directory: api
        run: pnpm audit --prod

      - name: Client Security Audit
        working-directory: client
        run: pnpm audit --prod

      # 💅 Code Linting & Formatting Verification
      - name: Verify API Formatting & Lint
        working-directory: api
        run: |
          pnpm run lint
          pnpm exec prettier --check "src/**/*.ts"

      # 🧪 Test Suites Execution
      - name: Run Backend Unit Tests (Vitest)
        working-directory: api
        env:
          CI: true
        run: pnpm run test:unit

      - name: Run Frontend Tests (Vitest)
        working-directory: client
        env:
          CI: true
        run: pnpm run test --run

      # 🏗️ Build Validation (Catch compile-time errors)
      - name: Build Backend
        working-directory: api
        run: pnpm run build

      - name: Build Frontend
        working-directory: client
        run: pnpm run build
