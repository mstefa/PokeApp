name: Continuous Deployment

on:
  push:
    branches: [main]

jobs:
  deploy-backend:
    name: Deploy Backend API to Render
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Render Deploy Hook
        # Fails silently if secret is not present yet (so pipeline doesn't block)
        run: |
          if [ -n "${{ secrets.RENDER_DEPLOY_HOOK_URL }}" ]; then
            echo "Triggering Render deployment..."
            curl -f -X POST "${{ secrets.RENDER_DEPLOY_HOOK_URL }}"
          else
            echo "Warning: RENDER_DEPLOY_HOOK_URL secret is not set. Skipping."
          fi

  deploy-frontend:
    name: Deploy Frontend Client to Cloudflare Pages
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install Pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11.5.0
          run_install: false

      - name: Get Pnpm Store Directory
        shell: bash
        id: pnpm-cache
        run: |
          echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_ENV

      - name: Cache Pnpm Dependencies
        uses: actions/cache@v4
        with:
          path: ${{ env.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Install Dependencies
        run: pnpm install --frozen-lockfile

      - name: Build Astro Frontend
        env:
          API_URL: ${{ secrets.API_URL }}
          PUBLIC_API_URL: ${{ secrets.API_URL }}
        run: pnpm --filter client run build

      - name: Deploy to Cloudflare Pages
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: pnpm --filter client exec wrangler pages deploy dist --project-name=pokeapp-client --branch=main
