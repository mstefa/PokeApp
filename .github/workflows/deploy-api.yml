name: Deploy Backend API

on:
  push:
    branches:
      - main
    paths:
      - 'api/**'
      - '.github/workflows/deploy-api.yml'
  workflow_dispatch:

jobs:
  deploy-backend:
    name: Deploy Backend API to Render
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Render Deploy Hook
        # Fails silently if secret is not present yet (so pipeline doesn't block)
        run: |
          if [ -n "${{ secrets.RENDER_DEPLOY_HOOK_URL }}" ]; then
            echo "Triggering Render deployment..."
            curl -f -X POST "${{ secrets.RENDER_DEPLOY_HOOK_URL }}"
          else
            echo "Warning: RENDER_DEPLOY_HOOK_URL secret is not set. Skipping."
          fi
